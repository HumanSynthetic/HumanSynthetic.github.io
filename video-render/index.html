<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Celia Fund — 10 Second Video Renderer</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #071f24;
      color: #fff;
    }
    main {
      width: min(720px, 100%);
      padding: 28px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 22px;
      background: rgba(255,255,255,.07);
      box-shadow: 0 24px 70px rgba(0,0,0,.32);
    }
    h1 { margin: 0 0 8px; font-size: clamp(1.55rem, 4vw, 2.25rem); }
    p { line-height: 1.55; color: #dbe8e8; }
    button, a.download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      color: #102f35;
      background: #e2b75c;
    }
    button:disabled { opacity: .55; cursor: wait; }
    progress { width: 100%; height: 16px; margin: 18px 0 8px; }
    #status { min-height: 1.5em; font-variant-numeric: tabular-nums; }
    .specs { font-size: .92rem; color: #bdd0d1; }
    .download { margin-top: 12px; }
    code { color: #f0cf86; }
  </style>
</head>
<body>
  <main>
    <h1>The Celia Fund — 10-Second Ad Renderer</h1>
    <p>This creates the finished silent vertical MP4 from the four Canva frames. It applies subtle push-ins, 0.25-second crossfades, exact 10-second timing, and H.264 encoding.</p>
    <p class="specs">Output: <code>1080 × 1920</code> · <code>30 fps</code> · <code>10.00 seconds</code> · no audio</p>
    <button id="render">Render MP4</button>
    <progress id="progress" max="1" value="0"></progress>
    <div id="status">Ready.</div>
    <div id="download"></div>
  </main>

  <script type="module">
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
    import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

    const button = document.querySelector('#render');
    const progress = document.querySelector('#progress');
    const status = document.querySelector('#status');
    const download = document.querySelector('#download');

    const sourceUrls = [
      'https://images.weserv.nl/?url=design.canva.ai/jVuCPsPdsiCD_ut&output=png&w=1080&h=1920&fit=cover',
      'https://images.weserv.nl/?url=design.canva.ai/ZKv2Aw2JmznG35s&output=png&w=1080&h=1920&fit=cover',
      'https://images.weserv.nl/?url=design.canva.ai/YuwpDQWMomzHK0a&output=png&w=1080&h=1920&fit=cover',
      'https://images.weserv.nl/?url=design.canva.ai/9IQ1vu8gCoCugzb&output=png&w=1080&h=1920&fit=cover'
    ];

    const ffmpeg = new FFmpeg();
    ffmpeg.on('progress', ({ progress: value }) => {
      progress.value = Number.isFinite(value) ? Math.min(1, Math.max(0, value)) : 0;
      status.textContent = `Rendering… ${Math.round(progress.value * 100)}%`;
    });
    ffmpeg.on('log', ({ message }) => console.log(message));

    async function renderVideo() {
      button.disabled = true;
      download.innerHTML = '';
      progress.value = 0;

      try {
        status.textContent = 'Loading the video engine…';
        const ffmpegBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm';
        const coreBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';

        await ffmpeg.load({
          classWorkerURL: await toBlobURL(`${ffmpegBase}/worker.js`, 'text/javascript'),
          coreURL: await toBlobURL(`${coreBase}/ffmpeg-core.js`, 'text/javascript'),
          wasmURL: await toBlobURL(`${coreBase}/ffmpeg-core.wasm`, 'application/wasm')
        });

        status.textContent = 'Loading the four Canva frames…';
        for (let i = 0; i < sourceUrls.length; i++) {
          await ffmpeg.writeFile(`slide${i + 1}.png`, await fetchFile(sourceUrls[i]));
          progress.value = (i + 1) / 20;
        }

        status.textContent = 'Rendering…';
        await ffmpeg.exec([
          '-loop', '1', '-t', '2.70', '-i', 'slide1.png',
          '-loop', '1', '-t', '2.70', '-i', 'slide2.png',
          '-loop', '1', '-t', '2.70', '-i', 'slide3.png',
          '-loop', '1', '-t', '2.70', '-i', 'slide4.png',
          '-filter_complex',
          "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,zoompan=z='min(zoom+0.00025,1.025)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=81:s=1080x1920:fps=30,format=yuv420p,setpts=PTS-STARTPTS[v0];" +
          "[1:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,zoompan=z='min(zoom+0.00022,1.022)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=81:s=1080x1920:fps=30,format=yuv420p,setpts=PTS-STARTPTS[v1];" +
          "[2:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,zoompan=z='min(zoom+0.00025,1.025)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=81:s=1080x1920:fps=30,format=yuv420p,setpts=PTS-STARTPTS[v2];" +
          "[3:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,zoompan=z='min(zoom+0.00020,1.020)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=81:s=1080x1920:fps=30,format=yuv420p,setpts=PTS-STARTPTS[v3];" +
          "[v0][v1]xfade=transition=fade:duration=0.25:offset=2.45[x1];" +
          "[x1][v2]xfade=transition=fade:duration=0.25:offset=4.90[x2];" +
          "[x2][v3]xfade=transition=fade:duration=0.25:offset=7.35[vout]",
          '-map', '[vout]', '-t', '10.00', '-an', '-r', '30',
          '-c:v', 'libx264', '-preset', 'fast', '-crf', '20', '-movflags', '+faststart',
          'celia-fund-10s-ad-silent.mp4'
        ]);

        status.textContent = 'Preparing the download…';
        const data = await ffmpeg.readFile('celia-fund-10s-ad-silent.mp4');
        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.className = 'download';
        link.href = url;
        link.download = 'celia-fund-10s-ad-silent.mp4';
        link.textContent = `Download finished MP4 (${(blob.size / 1024 / 1024).toFixed(1)} MB)`;
        download.replaceChildren(link);
        progress.value = 1;
        status.textContent = 'Finished. The MP4 is ready.';
        link.click();
      } catch (error) {
        console.error(error);
        status.textContent = `Render failed: ${error?.message || error}`;
      } finally {
        button.disabled = false;
      }
    }

    button.addEventListener('click', renderVideo);
  </script>
</body>
</html>
